name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Build
        run: cargo build

      - name: Test
        run: cargo test
